<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U17 ECC AP</title>

  <!-- Collegamento al Manifest per PWA / Icona Mobile -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon per le schede del browser -->
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />

  <!-- Icona specifica per dispositivi Apple (iOS) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />

  <!-- Colore della barra di sistema dei telefoni -->
  <meta name="theme-color" content="#091F3E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Stili CSS integrati per Layout e Design Swiss Style -->
  <style>
    /* Reset di base */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f4f6f9;
      color: #333333;
      min-height: 100vh;
    }

    /* Header Swiss Basketball */
    .swiss-header {
      background-color: #091F3E;
      height: 70px;
      border-bottom: 4px solid #E30613;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    /* Contenitore per il Logo Sporgente */
    .logo-container {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .logo-img {
      height: 95px;
      width: auto;
      position: absolute;
      top: 8px; /* Fa sbordare l'icona del logo verso il basso */
      left: 0;
      filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.4));
      z-index: 100;
      transition: transform 0.2s ease-in-out;
    }

    .logo-img:hover {
      transform: scale(1.05);
    }

    /* Titolo dell'App */
    .header-content {
      margin-left: 110px; /* Evita che il testo si sovrapponga al logo */
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-title {
      color: #ffffff;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-size: 1.1rem;
    }

    .brand-separator {
      color: #E30613;
      font-weight: 900;
    }

    .brand-subtitle {
      color: #a0aec0;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    /* Navigazione di destra */
    .nav-menu {
      display: flex;
      gap: 20px;
    }

    .nav-link {
      color: #ffffff;
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: #E30613;
    }

    /* Area Principale Contenuti */
    .app-container {
      padding: 60px 24px 24px 24px; /* Offset superiore per dare spazio al logo sporgente */
      max-width: 1200px;
      margin: 0 auto;
    }

    .content-card {
      background: #ffffff;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border-top: 4px solid #091F3E;
      margin-top: 40px;
    }

    .content-card h2 {
      color: #091F3E;
      font-size: 1.8rem;
      margin-bottom: 12px;
    }

    .content-card p {
      color: #666666;
      font-size: 1rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Header Ufficiale in Stile Swiss Basketball -->
  <header class="swiss-header">
    <div class="logo-container">
      <img class="logo-img" src="/logo.png" alt="U17 ECC AP Logo" />
    </div>

    <div class="header-content">
      <span class="brand-title">U17 ECC AP</span>
      <span class="brand-separator">•</span>
      <span class="brand-subtitle">CAMPIONATO</span>
    </div>

    <nav class="nav-menu">
      <a href="#classifica" class="nav-link">Classifica</a>
      <a href="#partite" class="nav-link">Partite</a>
    </nav>
  </header>

  <!-- Contenitore per lo sviluppo dei contenuti futuri dell'App -->
  <main class="app-container">
    <div id="root">
      <!-- Se usi React o Vue, l'app monterà i componenti qui dentro -->
      <div class="content-card">
        <h2>Benvenuto nell'applicazione U17 ECC AP</h2>
        <p>L'app è configurata correttamente. L'header è responsive e il tuo logo originale è impostato come favicon e icona per la schermata home del telefono.</p>
      </div>
    </div>
  </main>

</body>
</html>
