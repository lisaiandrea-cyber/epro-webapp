<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #3b82f6; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2563eb; }
        #error-msg { color: red; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Accedi come Admin</h2>
    <form id="login-form">
        <input type="text" id="username" placeholder="Username Admin" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Accedi</button>
    </form>
    <p id="error-msg"></p>
</div>

<script>
    // ⚠️ CONFIGURAZIONE URL BACKEND:
    // Sostituisci con l'URL che ti assegna Render (es: 'https://miosito.onrender.com') se sei in produzione.
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:5000'
        : 'https://epro-webapp.onrender.com'; // <--- Incolla qui il link di Render

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        
        errorMsg.textContent = "";

        try {
            const response = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (result.success) {
                alert('Accesso Admin riuscito!');
                // Reindirizza l'utente o carica i dati protetti
                console.log(result.user);
            } else {
                errorMsg.textContent = result.message || 'Errore durante l\'accesso.';
            }
        } catch (err) {
            console.error(err);
            errorMsg.textContent = 'Impossibile connettersi al server.';
        }
    });
</script>

</body>
</html>
