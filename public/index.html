<!DOCTYPE html>
<html lang="it" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U17 ePRO Basketball</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- AlpineJS -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
  </style>
</head>
<body class="bg-gray-100 text-slate-900 min-h-full flex flex-col justify-between pb-24" 
      x-data="{ 
        activeTab: 'home', 
        showAuthModal: false, 
        authMode: 'login', // 'login', 'register', 'reset'
        isLoggedIn: false, 
        isAdmin: false,
        notificationsEnabled: false,
        email: '',
        password: '',
        themeColor: '#E61E2B',
        userDisplayName: '',
        
        // Liste Dati
        matches: [],
        news: [],
        roster: [],
        standings: [],
        stats: [],
        
        // Form Admin
        newMatch: { opponent: '', date: '', time: '', location: '', type: 'CASA', status: 'Prossima', score: '' },
        newMember: { name: '', role: '', number: '', category: 'giocatori', imageUrl: '' },
        newNews: { title: '', content: '', tag: 'Club News', imageUrl: '' },
        newTeam: { team: '', points: '' },
        newStat: { name: '', games: '', totalPoints: '' },

        // Inizializzazione Firebase
        firebaseConfig: {
          apiKey: 'AIzaSyCNn9yVzGopJrjQcevac-UsOp4TAMz8Y6E',
          authDomain: 'epro-web.firebaseapp.com',
          projectId: 'epro-web',
          storageBucket: 'epro-web.firebasestorage.app',
          messagingSenderId: '360243781432',
          appId: '1:360243781432:web:c2a70f3ef45df0c9d96bcd'
        },

        async init() {
          firebase.initializeApp(this.firebaseConfig);
          await this.loadData();

          // Monitora stato autenticazione
          firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
              this.isLoggedIn = true;
              this.userDisplayName = user.displayName || user.email;
              this.email = user.email;
              
              // Verifica se è l'admin locale o controlla su backend
              const token = await user.getIdToken();
              const res = await fetch('/api/auth/verify', {
                headers: { 'Authorization': `Bearer ${token}` }
              });
              const authInfo = await res.json();
              this.isAdmin = authInfo.isAdmin;
              this.notificationsEnabled = authInfo.notifications;
            } else {
              this.isLoggedIn = false;
              this.isAdmin = false;
              this.userDisplayName = '';
            }
          });
        },

        async loadData() {
          const res = await fetch('/api/data');
          const data = await res.json();
          this.matches = data.matches || [];
          this.news = data.news || [];
          this.roster = data.roster || [];
          this.standings = data.standings || [];
          this.stats = data.stats || [];
          this.themeColor = data.themeColor || '#E61E2B';
        },

        // Autenticazione Firebase
        async handleEmailAuth() {
          try {
            if (this.authMode === 'login') {
              await firebase.auth().signInWithEmailAndPassword(this.email, this.password);
              alert('Bentornato!');
            } else if (this.authMode === 'register') {
              await firebase.auth().createUserWithEmailAndPassword(this.email, this.password);
              alert('Registrazione completata con successo!');
            }
            this.showAuthModal = false;
            this.password = '';
          } catch (err) {
            alert(err.message);
          }
        },

        async handleGoogleAuth() {
          try {
            const provider = new firebase.auth.GoogleAuthProvider();
            await firebase.auth().signInWithPopup(provider);
            alert('Autenticazione Google avvenuta con successo!');
            this.showAuthModal = false;
          } catch (err) {
            alert(err.message);
          }
        },

        async handlePasswordReset() {
          try {
            await firebase.auth().sendPasswordResetEmail(this.email);
            alert('Ti abbiamo inviato un\'e-mail per reimpostare la tua password. Controlla la posta in arrivo!');
            this.authMode = 'login';
          } catch (err) {
            alert(err.message);
          }
        },

        async logout() {
          await firebase.auth().signOut();
          this.showAuthModal = false;
          this.activeTab = 'home';
        },

        async requestPushNotifications() {
          try {
            const messaging = firebase.messaging();
            const token = await messaging.getToken({ vapidKey: 'YOUR_PUBLIC_VAPID_KEY' });
            
            if (token) {
              const userToken = await firebase.auth().currentUser.getIdToken();
              await fetch('/api/user/subscribe', {
                method: 'POST',
                headers: { 
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${userToken}`
                },
                body: JSON.stringify({ pushToken: token })
              });
              this.notificationsEnabled = true;
              alert('Notifiche push attivate sul tuo dispositivo!');
            } else {
              alert('Nessun permesso per le notifiche accordato.');
            }
          } catch (err) {
            console.error('Errore attivazione push:', err);
            alert('Consenti le notifiche sul tuo browser per attivare il servizio.');
          }
        },

        // Gestione Admin
        async saveMatch() {
          const res = await fetch('/api/admin/match', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.newMatch)
          });
          const data = await res.json();
          if (data.success) {
            this.matches = data.matches;
            alert('Partita salvata e notifica inviata!');
            this.newMatch = { opponent: '', date: '', time: '', location: '', type: 'CASA', status: 'Prossima', score: '' };
          }
        },

        async saveNews() {
          const res = await fetch('/api/admin/news', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.newNews)
          });
          const data = await res.json();
          if (data.success) {
            this.news = data.news;
            alert('News pubblicata e notifica inviata!');
            this.newNews = { title: '', content: '', tag: 'Club News', imageUrl: '' };
          }
        }
      }">

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-4 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center space-x-3">
      <img src="/logo.png?v=1" alt="Logo U17 ePRO" class="w-11 h-11 object-contain" onerror="this.src='https://images.unsplash.com/photo-1546519638-68e109498ffc?w=100'">
      <div>
        <h1 class="text-base font-extrabold tracking-tight text-slate-900">U17 <span :style="`color: ${themeColor}`">ePRO</span></h1>
        <p class="text-[9px] text-gray-500 font-bold tracking-wider uppercase">Youth League Basket</p>
      </div>
    </div>
    
    <div>
      <button @click="showAuthModal = true" class="p-2.5 bg-gray-100 hover:bg-gray-200 rounded-full transition text-slate-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- CONTENUTO PRINCIPALE -->
  <main class="flex-1 max-w-md mx-auto w-full px-4 py-5">

    <!-- ================= HOME SECTION ================= -->
    <section x-show="activeTab === 'home'" class="space-y-5">
      
      <!-- Attivatore notifiche sportivo se connesso -->
      <div x-show="isLoggedIn && !notificationsEnabled" class="bg-white border border-gray-200 rounded-xl p-4 flex items-center justify-between shadow-sm">
        <div class="space-y-0.5">
          <h4 class="font-bold text-xs text-slate-900">Notifiche in Tempo Reale 🔔</h4>
          <p class="text-[10px] text-gray-500">Ricevi i risultati finali e i comunicati.</p>
        </div>
        <button @click="requestPushNotifications()" :style="`background-color: ${themeColor}`" class="text-white font-bold text-[11px] px-3.5 py-2 rounded-lg uppercase tracking-wider">
          Attiva
        </button>
      </div>

      <!-- Prossimo Match -->
      <div>
        <h3 class="text-[10px] font-extrabold uppercase tracking-wider text-gray-400 mb-2.5">Prossima partita</h3>
        <template x-if="matches.filter(m => m.status === 'Prossima').length > 0">
          <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
            <div class="text-white px-4 py-2 flex justify-between items-center text-[10px] font-bold" :style="`background-color: ${themeColor}`">
              <span class="uppercase">Campionato Nazionale</span>
              <span x-text="matches.filter(m => m.status === 'Prossima')[0].type"></span>
            </div>
            
            <div class="p-5 text-center">
              <div class="flex items-center justify-between">
                <div class="flex-1 text-center">
                  <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mx-auto border border-gray-100">
                    <img src="/logo.png?v=1" class="w-8 h-8 object-contain">
                  </div>
                  <p class="text-xs font-bold mt-2 text-slate-800">AREA PRO</p>
                </div>
                <div class="px-2">
                  <span class="text-xs font-extrabold text-gray-400 bg-gray-100 px-2.5 py-1 rounded-full">VS</span>
                </div>
                <div class="flex-1 text-center">
                  <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mx-auto border border-gray-100">
                    <span class="text-base font-bold text-gray-400">🏀</span>
                  </div>
                  <p class="text-xs font-bold mt-2 text-slate-800" x-text="matches.filter(m => m.status === 'Prossima')[0].opponent"></p>
                </div>
              </div>
              <div class="mt-5 pt-4 border-t border-gray-100 text-[11px] text-gray-500">
                <p class="font-bold text-slate-700" x-text="matches.filter(m => m.status === 'Prossima')[0].date + ' • Ore ' + matches.filter(m => m.status === 'Prossima')[0].time"></p>
              </div>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- (Sezioni Season, Roster, News rimangono inalterate con l'eccellente grafica Swiss Basketball...) -->

  </main>

  <!-- MODALE AUTENTICAZIONE COMPLETO (Login, Registrazione & Reset Password) -->
  <div x-show="showAuthModal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div @click.away="showAuthModal = false" class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl border border-gray-200 p-6 space-y-5 relative shadow-xl">
      <button @click="showAuthModal = false" class="absolute top-4 right-4 text-gray-400 hover:text-slate-900">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

      <!-- SE NON CONNESSO -->
      <div x-show="!isLoggedIn" class="space-y-4">
        <div class="text-center">
          <img src="/logo.png?v=1" class="w-14 h-14 object-contain mx-auto mb-2" onerror="this.style.display='none'">
          <h3 class="text-base font-extrabold text-slate-900" x-text="authMode === 'login' ? 'Accedi all\'App' : (authMode === 'register' ? 'Crea un Account' : 'Reimposta Password')"></h3>
          <p class="text-xs text-gray-500" x-text="authMode === 'login' ? 'Segui i tuoi ragazzi e attiva le notifiche.' : (authMode === 'register' ? 'Registrati in pochi secondi.' : 'Inserisci la tua email per reimpostare.')"></p>
        </div>

        <!-- Form Email/Password -->
        <form @submit.prevent="authMode === 'reset' ? handlePasswordReset() : handleEmailAuth()" class="space-y-3">
          <input type="email" x-model="email" required placeholder="Inserisci l'email" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-xs focus:ring-1 focus:ring-red-500 focus:outline-none">
          
          <template x-if="authMode !== 'reset'">
            <input type="password" x-model="password" required placeholder="Inserisci password" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-xs focus:ring-1 focus:ring-red-500 focus:outline-none">
          </template>

          <button type="submit" :style="`background-color: ${themeColor}`" class="w-full text-white font-bold py-3 rounded-lg text-xs uppercase tracking-wider" x-text="authMode === 'login' ? 'Accedi' : (authMode === 'register' ? 'Registrati' : 'Invia Email di Reset')"></button>
        </form>

        <!-- Divider -->
        <div x-show="authMode !== 'reset'" class="flex items-center my-4">
          <div class="flex-grow border-t border-gray-200"></div>
          <span class="mx-3 text-[10px] text-gray-400 font-bold uppercase">oppure</span>
          <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <!-- Bottone Accedi con Google -->
        <button x-show="authMode !== 'reset'" @click="handleGoogleAuth()" class="w-full flex items-center justify-center space-x-2 border border-gray-200 hover:bg-gray-50 bg-white py-3 rounded-lg text-xs font-bold transition">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.48 14.99 1 12 1 7.35 1 3.4 3.65 1.5 7.5l3.86 3C6.3 7.57 8.94 5.04 12 5.04z"/>
            <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.27H12v4.51h6.46c-.29 1.48-1.14 2.73-2.4 3.56l3.73 2.9c2.18-2.02 3.7-5.02 3.7-8.7z"/>
            <path fill="#FBBC05" d="M5.36 14.5c-.24-.72-.38-1.49-.38-2.5s.14-1.78.38-2.5L1.5 6.5C.54 8.42 0 10.51 0 12.75s.54 4.33 1.5 6.25l3.86-3z"/>
            <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.9l-3.73-2.9c-1.1.74-2.52 1.19-4.23 1.19-3.06 0-5.7-2.53-6.64-5.46L1.5 15.9C3.4 19.75 7.35 23 12 23z"/>
          </svg>
          <span class="text-slate-700">Accedi con Google</span>
        </button>

        <!-- Switch Modalità -->
        <div class="text-center pt-2 text-xs">
          <p class="text-gray-500" x-show="authMode === 'login'">Non hai un account? <a href="#" @click="authMode = 'register'" :style="`color: ${themeColor}`" class="font-bold underline">Registrati</a></p>
          <p class="text-gray-500" x-show="authMode === 'register'">Hai già un account? <a href="#" @click="authMode = 'login'" :style="`color: ${themeColor}`" class="font-bold underline">Accedi</a></p>
          <p class="text-gray-500 mt-2"><a href="#" @click="authMode = 'reset'" class="text-gray-400 hover:text-gray-600 underline">Password dimenticata?</a></p>
        </div>
      </div>

      <!-- SE CONNESSO -->
      <div x-show="isLoggedIn" class="space-y-4">
        <div class="text-center">
          <h3 class="text-base font-extrabold text-slate-900">Profilo Utente</h3>
          <p class="text-xs text-gray-500 mt-1" x-text="'Connesso come: ' + userDisplayName"></p>
        </div>
        <button @click="logout()" class="w-full bg-red-50 text-red-600 hover:bg-red-100 py-3 rounded-lg text-xs font-bold border border-red-200 uppercase tracking-wider">Disconnetti</button>
      </div>
    </div>
  </div>

  <!-- NAVIGATION BAR -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-2.5 px-4 flex justify-around items-center z-50 max-w-md mx-auto rounded-t-xl shadow-lg">
    <!-- ... Resto della nav bar ... -->
  </nav>

</body>
</html>
